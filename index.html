{% extends "base.html" %}

{% block title %}Home - Library Management System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="text-center">
        <div class="logo mb-4">
            <i class="fas fa-book-open fa-4x text-white"></i>
        </div>
        <h1 class="text-white mb-4">Library Management System</h1>
        <p class="text-white-50 mb-5">Your gateway to knowledge and learning resources</p>
        
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="glass-card p-4">
                    <h3 class="text-white mb-4">Get Started</h3>
                    <div class="d-grid gap-3">
                        <a href="{{ url_for('login') }}" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </a>
                        <a href="{{ url_for('register') }}" class="btn btn-outline-light btn-lg">
                            <i class="fas fa-user-plus"></i> Register
                        </a>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-5">
            <p class="text-white-50">
                © 2024 Library Management System. All rights reserved.
            </p>
        </div>
    </div>
</div>

<style>
.auth-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
}

.logo {
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
}
</style>
{% endblock %}
