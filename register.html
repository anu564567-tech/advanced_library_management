<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Library Management System</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Modern Glassmorphism CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth-glassmorphism.css') }}">
</head>
<body class="auth-bg">
    <div class="auth-box">
        <div class="auth-header">
            <div class="logo">
                <i class="fas fa-book-open"></i>
            </div>
            <h2>Create Account</h2>
            <p>Join our library management system</p>
        </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'error' else category }}" role="alert">
                            <i class="fas fa-{% if category == 'success' %}check-circle{% elif category == 'danger' or category == 'error' %}exclamation-circle{% elif category == 'warning' %}exclamation-triangle{% else %}info-circle{% endif %}"></i>
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST">
                <div class="row">
                    <div class="col-md-12">
                        <div class="form-group">
                            <label for="name">Full Name *</label>
                            <input type="text" class="form-control" id="name" name="name" required placeholder="Enter your full name">
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" class="form-control" id="email" name="email" required placeholder="your@email.com">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group" id="rollNumberGroup">
                            <label for="roll_number">Roll Number <span id="rollNumberRequired">*</span></label>
                            <input type="text" class="form-control" id="roll_number" name="roll_number" placeholder="BCA2024001">
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="password">Password *</label>
                            <input type="password" class="form-control" id="password" name="password" required placeholder="Min. 6 characters">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="confirm_password">Confirm Password *</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required placeholder="Confirm password">
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="contact">Contact Number *</label>
                            <input type="tel" class="form-control" id="contact" name="contact" required placeholder="+91 9876543210">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="role">User Role *</label>
                            <select class="form-control" id="role" name="role" required>
                                <option value="">Select Role</option>
                                <option value="student">Student</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                                
                <div class="row">
                    <div class="col-md-12">
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" class="form-control" id="address" name="address" placeholder="Your address">
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn-auth">Create Account</button>
            </form>
            
            <div class="auth-link">
                Already have an account? <a href="/login">Sign in</a>
            </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const roleSelect = document.getElementById('role');
            const rollNumberInput = document.getElementById('roll_number');
            const rollNumberRequired = document.getElementById('rollNumberRequired');
            const rollNumberGroup = document.getElementById('rollNumberGroup');
            const emailInput = document.getElementById('email');
            const contactInput = document.getElementById('contact');
            const sendEmailCodeBtn = document.getElementById('sendEmailCode');
            const sendMobileCodeBtn = document.getElementById('sendMobileCode');
            
            let emailCode = '';
            let mobileCode = '';
            
            function updateRollNumberRequirement() {
                if (roleSelect.value === 'admin') {
                    rollNumberInput.removeAttribute('required');
                    rollNumberInput.placeholder = 'Optional for admin';
                    rollNumberRequired.style.display = 'none';
                } else {
                    rollNumberInput.setAttribute('required', '');
                    rollNumberInput.placeholder = 'BCA2024001';
                    rollNumberRequired.style.display = 'inline';
                }
            }
            
            // Update roll number requirement based on role
            function updateRollNumberRequirement() {
                if (roleSelect.value === 'admin') {
                    rollNumberInput.removeAttribute('required');
                    rollNumberInput.placeholder = 'Optional for admin';
                    rollNumberRequired.style.display = 'none';
                } else {
                    rollNumberInput.setAttribute('required', '');
                    rollNumberInput.placeholder = 'BCA2024001';
                    rollNumberRequired.style.display = 'inline';
                }
            }
            
            roleSelect.addEventListener('change', updateRollNumberRequirement);
            updateRollNumberRequirement(); // Initialize on page load
        });
    </script>
</body>
</html>
