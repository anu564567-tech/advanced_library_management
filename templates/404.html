{% extends "base.html" %}

{% block title %}Page Not Found - Library Management System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="text-center">
        <div class="error-container">
            <div class="error-code">
                <h1 class="display-1 text-white">404</h1>
            </div>
            <div class="error-message">
                <h3 class="text-white mb-3">Page Not Found</h3>
                <p class="text-white-50 mb-4">The page you're looking for doesn't exist or has been moved.</p>
            </div>
            <div class="error-actions">
                <a href="{{ url_for('index') }}" class="btn btn-primary me-3">
                    <i class="fas fa-home"></i> Go Home
                </a>
                <a href="{{ url_for('login') }}" class="btn btn-outline-light">
                    <i class="fas fa-sign-in-alt"></i> Login
                </a>
            </div>
        </div>
    </div>
</div>

<style>
.error-container {
    max-width: 600px;
    margin: 0 auto;
    padding: 50px 20px;
}

.error-code h1 {
    font-size: 120px;
    font-weight: 700;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
}

.error-message h3 {
    font-weight: 600;
    margin-bottom: 15px;
}

.error-actions {
    margin-top: 30px;
}

.error-actions .btn {
    padding: 12px 30px;
    font-weight: 600;
    border-radius: 10px;
    transition: all 0.3s ease;
}

.error-actions .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
}
</style>
{% endblock %}
